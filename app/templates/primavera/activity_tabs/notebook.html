<!-- Notebook Tab - ملاحظات النشاط -->
<div class="field-group">
    <h6 class="field-group-title">
        <i class="fas fa-book text-primary"></i>
        Activity Notebook
    </h6>
    
    <div class="notebook-content" id="activityNotebook" contenteditable="true">
        {{ activity.notebook_content or '' }}
    </div>
    
    <div class="mt-3 d-flex justify-content-end gap-2">
        <button class="btn btn-sm btn-outline-primary" onclick="addNotebookEntry()">
            <i class="fas fa-plus me-1"></i> Add Entry
        </button>
        <button class="btn btn-sm btn-outline-secondary" onclick="formatText('bold')">
            <i class="fas fa-bold"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary" onclick="formatText('italic')">
            <i class="fas fa-italic"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary" onclick="formatText('underline')">
            <i class="fas fa-underline"></i>
        </button>
    </div>
</div>

<div class="field-group mt-4">
    <h6 class="field-group-title">
        <i class="fas fa-history text-primary"></i>
        Notebook History
    </h6>
    
    <div class="notebook-entries">
        {% for entry in notebook_entries %}
        <div class="notebook-entry">
            <div class="d-flex justify-content-between">
                <div>
                    <span class="entry-date">{{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
                    <span class="entry-author">by {{ entry.author.full_name }}</span>
                </div>
                <button class="btn btn-sm btn-link" onclick="editEntry({{ entry.id }})">
                    <i class="fas fa-edit"></i>
                </button>
            </div>
            <div class="mt-2">
                {{ entry.content }}
            </div>
        </div>
        {% else %}
        <div class="text-center py-4">
            <i class="fas fa-book-open fa-3x text-muted mb-3"></i>
            <p class="text-muted">No notebook entries yet</p>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function addNotebookEntry() {
    const content = prompt('Enter notebook entry:');
    if (content) {
        const currentContent = document.getElementById('activityNotebook').innerHTML;
        const date = new Date().toLocaleString('ar-SA');
        const newEntry = `<div class="notebook-entry mt-3">
            <div class="text-muted small">Added on ${date}</div>
            <div>${content}</div>
        </div>`;
        document.getElementById('activityNotebook').innerHTML = currentContent + newEntry;
    }
}

function formatText(command) {
    document.execCommand(command, false, null);
}
</script>
