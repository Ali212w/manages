{# templates/resources/_resource_form.html #}

<input type="hidden" name="resources[0][resource_id]" value="">
<input type="hidden" name="resources[0][name]" value="">
<input type="hidden" name="resources[0][resource_type]" value="">

<!-- المعلومات الأساسية -->
<div class="form-section">
    <div class="row">
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-barcode"></i>
                كود المورد <span class="text-danger">*</span>
            </label>
            <input type="text" name="resources[0][resource_id]" class="form-control" 
                   placeholder="مثال: RES-001" required>
            <div class="help-text">كود فريد للمورد</div>
        </div>
        
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-tag"></i>
                اسم المورد <span class="text-danger">*</span>
            </label>
            <input type="text" name="resources[0][name]" class="form-control" 
                   placeholder="أدخل اسم المورد" required>
        </div>
    </div>
</div>

<!-- تصنيف المورد -->
<div class="form-section">
    <div class="row">
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-layer-group"></i>
                نوع المورد <span class="text-danger">*</span>
            </label>
            <select name="resources[0][resource_type]" id="resourceType_0" class="form-select" 
                    onchange="showTypeFields(this)" required>
                <option value="">اختر نوع المورد</option>
                <option value="labor">موارد بشرية (عمالة)</option>
                <option value="material">مواد</option>
                <option value="equipment">معدات</option>
                <option value="non_labor">موارد أخرى</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-ruler"></i>
                الوحدة
            </label>
            <select name="resources[0][unit]" class="form-select">
                <option value="">اختر الوحدة</option>
                <option value="hour">ساعة</option>
                <option value="day">يوم</option>
                <option value="month">شهر</option>
                <option value="piece">قطعة</option>
                <option value="kg">كيلوجرام</option>
                <option value="ton">طن</option>
                <option value="m3">متر مكعب</option>
                <option value="m2">متر مربع</option>
                <option value="meter">متر طولي</option>
            </select>
            <div class="help-text">وحدة قياس المورد</div>
        </div>
    </div>
</div>

<!-- حقول الموارد البشرية -->
<div id="laborFields_0" class="dynamic-fields" style="display: none;">
    <div class="form-section">
        <h6 class="section-title">
            <i class="fas fa-user-tie"></i>
            معلومات الموارد البشرية
        </h6>
        <div class="row">
            <div class="form-group">
                <label class="form-label">العامل</label>
                <select name="resources[0][employee_id]" class="form-select">
                    <option value="">-- اختر العامل --</option>
                    {% for employee in employees %}
                    <option value="{{ employee.id }}">{{ employee.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">التخصص</label>
                <input type="text" name="resources[0][specialization]" class="form-control" 
                       placeholder="مثال: بناء، كهرباء، سباكة">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">المهارات</label>
            <textarea name="resources[0][skills]" class="form-control" rows="2" 
                      placeholder="مثال: لحام، تشغيل معدات، صب خرسانة"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">سنوات الخبرة</label>
            <input type="number" name="resources[0][experience_years]" class="form-control" 
                   step="0.5" min="0" value="0">
        </div>
    </div>
</div>

<!-- حقول المعدات -->
<div id="equipmentFields_0" class="dynamic-fields" style="display: none;">
    <div class="form-section">
        <h6 class="section-title">
            <i class="fas fa-tractor"></i>
            معلومات المعدات
        </h6>
        <div class="row">
            <div class="form-group">
                <label class="form-label">نوع المعدة</label>
                <input type="text" name="resources[0][equipment_type]" class="form-control" 
                       placeholder="مثال: حفار، رافعة، شاحنة">
            </div>
            <div class="form-group">
                <label class="form-label">الموديل</label>
                <input type="text" name="resources[0][equipment_model]" class="form-control" 
                       placeholder="مثال: CAT 320D">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label class="form-label">الرقم التسلسلي</label>
                <input type="text" name="resources[0][equipment_serial]" class="form-control" 
                       placeholder="الرقم التسلسلي للمعدة">
            </div>
            <div class="form-group">
                <label class="form-label">الشركة المصنعة</label>
                <input type="text" name="resources[0][manufacturer]" class="form-control" 
                       placeholder="اسم الشركة المصنعة">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label class="form-label">سنة الصنع</label>
                <input type="number" name="resources[0][manufacturing_year]" class="form-control" 
                       placeholder="مثال: 2020">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label class="form-label">آخر صيانة</label>
                <input type="date" name="resources[0][last_maintenance]" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">الصيانة القادمة</label>
                <input type="date" name="resources[0][next_maintenance]" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">دورة الصيانة (أيام)</label>
            <input type="number" name="resources[0][maintenance_cycle]" class="form-control" 
                   value="30" min="0">
        </div>
    </div>
</div>

<!-- حقول المواد -->
<div id="materialFields_0" class="dynamic-fields" style="display: none;">
    <div class="form-section">
        <h6 class="section-title">
            <i class="fas fa-cube"></i>
            معلومات المواد
        </h6>
        <div class="row">
            <div class="form-group">
                <label class="form-label">نوع المادة</label>
                <input type="text" name="resources[0][material_type]" class="form-control" 
                       placeholder="مثال: حديد، اسمنت، خشب">
            </div>
            <div class="form-group">
                <label class="form-label">درجة المادة</label>
                <input type="text" name="resources[0][material_grade]" class="form-control" 
                       placeholder="مثال: ASTM A615 Grade 60">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label class="form-label">المورد</label>
                <select name="resources[0][supplier_id]" class="form-select">
                    <option value="">اختر المورد</option>
                    {% for supplier in suppliers %}
                    <option value="{{ supplier.id }}">{{ supplier.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label class="form-label">الحد الأدنى للكمية</label>
                <input type="number" name="resources[0][minimum_quantity]" class="form-control" 
                       step="0.01" min="0" value="0">
            </div>
            <div class="form-group">
                <label class="form-label">الحد الأقصى للكمية</label>
                <input type="number" name="resources[0][maximum_quantity]" class="form-control" 
                       step="0.01" min="0" value="0">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">كمية إعادة الطلب</label>
            <input type="number" name="resources[0][reorder_quantity]" class="form-control" 
                   step="0.01" min="0" value="0">
            <div class="help-text">الكمية التي يتم طلبها عند وصول المخزون للحد الأدنى</div>
        </div>
    </div>
</div>

<!-- التكلفة والكمية -->
<div class="form-section">
    <h6 class="section-title">
        <i class="fas fa-coins"></i>
        التكلفة والكمية
    </h6>
    
    <div class="row">
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-money-bill"></i>
                التكلفة لكل وحدة
            </label>
            <input type="number" name="resources[0][cost_per_unit]" class="form-control" 
                   step="0.01" min="0" value="0">
        </div>
        
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-boxes"></i>
                الكمية المتاحة
            </label>
            <input type="number" name="resources[0][available_quantity]" class="form-control" 
                   step="0.01" min="0" value="0">
            <div class="help-text">الكمية المتاحة للاستخدام</div>
        </div>
    </div>
    
    <div class="row">
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-dollar-sign"></i>
                العملة
            </label>
            <select name="resources[0][currency]" class="form-select">
                <option value="SAR">ريال سعودي (SAR)</option>
                <option value="USD">دولار أمريكي (USD)</option>
                <option value="EUR">يورو (EUR)</option>
                <option value="AED">درهم إماراتي (AED)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">
                <i class="fas fa-calendar"></i>
                التقويم
            </label>
            <select name="resources[0][calendar_id]" class="form-select">
                <option value="">-- اختر التقويم --</option>
                {% for calendar in calendars %}
                <option value="{{ calendar.id }}">{{ calendar.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>
